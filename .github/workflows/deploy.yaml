name: Deploy to EKS
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 CRITICAL FIX: Added Docker Hub login back so you have permission to push
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: bilalafzalbhatti/shopping_store_backend:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ecommerce-cluster --region us-east-1

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/backend-deployment.yml -n default
          kubectl apply -f k8s/ingress.yml -n default
          kubectl rollout restart deployment ecommerce-backend -n default





