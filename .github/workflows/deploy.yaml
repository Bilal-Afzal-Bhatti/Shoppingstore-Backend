name: Deploy Backend to EKS & ECR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/shopping_store_backend:latest
            ${{ steps.login-ecr.outputs.registry }}/shopping_store_backend:${{ github.sha }}

      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ecommerce-cluster --region us-east-1

      - name: Deploy to EKS
        run: |
          # 1. Apply Kubernetes manifests
          kubectl apply -f k8s/backend-deployment.yml -n default
          kubectl apply -f k8s/ingress.yml -n default
          
          # 2. Update deployment image to the new ECR tag
          kubectl set image deployment/ecommerce-backend \
            backend=${{ steps.login-ecr.outputs.registry }}/shopping_store_backend:${{ github.sha }} -n default
          
          # 3. Monitor rollout status
          kubectl rollout status deployment/ecommerce-backend -n default











