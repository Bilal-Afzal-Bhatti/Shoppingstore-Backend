name: Deploy Backend to EKS

on:
  push:
    branches:
      - main  # Triggers the pipeline whenever you push code to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./Backend          # 🎯 Shifted context to the actual Backend folder
        file: ./Backend/Dockerfile   # 🎯 Pointed explicitly to the capital 'D' Dockerfile
        push: true
        tags: bilalafzalbhatti/shopping_store_backend:latest

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --name ecommerce-cluster --region us-east-1

    - name: Deploy to EKS
      run: |
        kubectl apply -f Backend/k8s/backend-deployment.yml    # 🎯 Adjusted to find manifests inside Backend/k8s
        # If your ingress file is inside the Backend/k8s folder, leave it like this:
        kubectl apply -f Backend/k8s/ingress.yml               
        kubectl rollout restart deployment ecommerce-backend -n default