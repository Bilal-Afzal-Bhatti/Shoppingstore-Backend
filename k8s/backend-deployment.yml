# k8s/backend-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-backend
  labels:
    app: ecommerce-backend
spec:
  replicas: 2                    # ✅ 2 instances for high availability
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
      - name: backend
        image: yourdockerhub/ecommerce-backend:v1.0
        ports:
        - containerPort: 5731
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: MONGODB_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu:    "100m"
          limits:
            memory: "512Mi"
            cpu:    "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5731
          initialDelaySeconds: 30
          periodSeconds:       10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5731
          initialDelaySeconds: 5
          periodSeconds:       5
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-service
spec:
  selector:
    app: ecommerce-backend
  ports:
  - port:       5731
    targetPort: 5731
  type: ClusterIP