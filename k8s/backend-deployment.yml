apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-backend
  labels:
    app: ecommerce-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
      - name: backend
        image: bilalafzalbhatti/shopping_store_backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5731 # 👈 Updated port
        env:
        - name: PORT
          value: "5731"
        - name: NODE_ENV
          value: "production"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: JWT_SECRET
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: STRIPE_SECRET_KEY
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: GOOGLE_CLIENT_ID
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: EMAIL_USER
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: EMAIL_PASS
        resources:
          requests:
            memory: "128Mi"
            cpu:    "100m"
          limits:
            memory: "512Mi"
            cpu:    "500m"
        livenessProbe:
          httpGet:
            path: / # or /api/health if defined in Express
            port: 5731 # 👈 Updated port
          initialDelaySeconds: 30
          periodSeconds:       10
        readinessProbe:
          httpGet:
            path: / # or /api/health if defined in Express
            port: 5731 # 👈 Updated port
          initialDelaySeconds: 10
          periodSeconds:       5
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-service
spec:
  selector:
    app: ecommerce-backend
  ports:
  - port:       5000  # Internal ClusterIP port (can remain 5000)
    targetPort: 5731  # 👈 Points to container port 5731
  type: ClusterIP