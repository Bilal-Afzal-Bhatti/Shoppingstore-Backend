apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: ecommerce-group
spec:
  ingressClassName: alb
  rules:
  - host: nexcuscart.com
    http:
      paths:
      # Backend API Route (Matched to service port 5731)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ecommerce-backend-service
            port:
              number: 5731  # 👈 Fixed: matches ecommerce-backend-service port

      # Frontend Web Route
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce-frontend-service
            port:
              number: 80