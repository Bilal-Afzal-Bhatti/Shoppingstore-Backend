apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  annotations:
    # Optional: SSL Redirection if using cert-manager / TLS
    # ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx  # Ensure your NGINX ingress controller class is defined
  rules:
  # Frontend Route
  - host: nexcuscart.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce-frontend-service
            port:
              number: 80

  # Backend API Route
  - host: api.nexcuscart.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce-backend-service
            port:
              number: 5731

  # Admin Panel Route
  - host: admin.nexcuscart.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce-admin-service
            port:
              number: 80